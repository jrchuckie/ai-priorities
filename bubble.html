<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI专项 优先级气泡图</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f8fa;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .chart-wrap {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    padding: 32px 36px 24px;
    width: 100%;
    max-width: 820px;
  }
  .legend-row {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 18px; flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: #444;
  }
  .legend-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .note-row { margin-top: 10px; font-size: 12px; color: #aaa; text-align: center; }
</style>
</head>
<body>

<h1>🤖 AI专项 优先级矩阵</h1>
<p class="subtitle">X轴：实现难易度 · Y轴：业务影响力 · 气泡大小：预估节省人天/月 · 颜色：产品现有能力</p>

<div class="chart-wrap">
  <canvas id="bubble" width="780" height="500"></canvas>
</div>

<div class="legend-row">
  <div class="legend-item"><span class="legend-dot" style="background:#27ae60"></span>已有能力</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>有部分能力</div>
  <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span>无现有能力</div>
</div>
<div class="note-row">气泡越大 = 节省人天越多 · 鼠标悬停查看详情</div>

<div id="tooltip" style="
  display:none; position:fixed;
  background:rgba(26,26,46,0.92); color:white;
  padding:10px 14px; border-radius:10px;
  font-size:13px; pointer-events:none;
  z-index:999; max-width:240px; line-height:1.7;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
"></div>

<script>
// ─── 类别级别数据 ───────────────────────────────────────
// x: 难易度  1=低  2=中  3=高
// y: 影响力  1=低  2=中  3=高
// saveDays: 汇总预估节省人天/月
// cap: 整体能力评估
// detail: tooltip 里的补充说明

const categories = [
  {
    label: "内容",
    x: 2.5, y: 3.2,
    saveDays: 100,   // AIGC笔记60 + 内容分析×2 共100
    cap: "partial",
    priority: "P0",
    detail: "AIGC笔记生产、内容分析（母婴+大健康）\n节省 ~100 人天/月",
  },
  {
    label: "月报/周报",
    x: 1.7, y: 3.5,
    saveDays: 113,   // 行业周报对客48+对内30+头客月报35
    cap: "partial",
    priority: "P0~P1",
    detail: "行业周报（对客/对内）、头客月报\n节省 ~113 人天/月",
  },
  {
    label: "分析/复盘",
    x: 2.2, y: 2.5,
    saveDays: 132,   // 品牌形象40+情绪浓度40+AURA12+一方工具18+投放复盘22
    cap: "none",
    priority: "P0~P2",
    detail: "品牌形象/情绪浓度分析、AURA复盘、\n一方工具升级、投放复盘\n节省 ~132 人天/月",
  },
  {
    label: "搜索",
    x: 2.0, y: 2.0,
    saveDays: 55,    // 搜索推词30+打标取数25
    cap: "none",
    priority: "P1",
    detail: "搜索推词工具、搜索词打标+取数\n节省 ~55 人天/月",
  },
  {
    label: "洞察",
    x: 2.6, y: 2.2,
    saveDays: 78,    // 舆情36+行业竞品20+CampaignIdea12+潮玩IP10
    cap: "partial",
    priority: "P0~P2",
    detail: "站内舆情风险、行业&竞品洞察、\nCampaign Idea、潮玩IP分析\n节省 ~78 人天/月",
  },
];

const capColor = {
  has:     { bg: "rgba(39,174,96,0.78)",  border: "#1e8449" },
  partial: { bg: "rgba(243,156,18,0.78)", border: "#b7770d" },
  none:    { bg: "rgba(231,76,60,0.78)",  border: "#922b21" },
};

// 气泡半径：对数映射，避免最大泡撑死画布
function toR(days) { return Math.sqrt(days) * 3.5; }

const dataset = {
  data: categories.map(c => ({
    x: c.x, y: c.y,
    r: toR(c.saveDays),
    _meta: c,
  })),
  backgroundColor: categories.map(c => capColor[c.cap].bg),
  borderColor:     categories.map(c => capColor[c.cap].border),
  borderWidth: 2.5,
};

// ─── 四象限背景插件 ───────────────────────────────────────
const quadrantPlugin = {
  id: "quadrant",
  beforeDraw(chart) {
    const { ctx, chartArea: ca, scales } = chart;
    if (!ca) return;
    const mx = scales.x.getPixelForValue(2);
    const my = scales.y.getPixelForValue(2);

    const zones = [
      { x: ca.left, y: ca.top,  w: mx-ca.left,  h: my-ca.top,      fill: "rgba(39,174,96,0.06)",  label: "Quick Win ✦", tx: ca.left+10, ty: ca.top+10,      align: "left",  base: "top" },
      { x: mx,      y: ca.top,  w: ca.right-mx, h: my-ca.top,      fill: "rgba(243,156,18,0.05)", label: "大赌注",       tx: ca.right-10,ty: ca.top+10,      align: "right", base: "top" },
      { x: ca.left, y: my,      w: mx-ca.left,  h: ca.bottom-my,   fill: "rgba(52,152,219,0.05)", label: "填充项",       tx: ca.left+10, ty: ca.bottom-10,   align: "left",  base: "bottom" },
      { x: mx,      y: my,      w: ca.right-mx, h: ca.bottom-my,   fill: "rgba(200,200,200,0.05)","label": "谨慎推进",   tx: ca.right-10,ty: ca.bottom-10,   align: "right", base: "bottom" },
    ];

    zones.forEach(z => {
      ctx.save();
      ctx.fillStyle = z.fill;
      ctx.fillRect(z.x, z.y, z.w, z.h);
      ctx.font = "bold 11px 'PingFang SC', sans-serif";
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.textAlign = z.align;
      ctx.textBaseline = z.base;
      ctx.fillText(z.label, z.tx, z.ty);
      ctx.restore();
    });

    // 分割线
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.1)";
    ctx.setLineDash([5, 5]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx, ca.top);    ctx.lineTo(mx, ca.bottom);
    ctx.moveTo(ca.left, my);   ctx.lineTo(ca.right, my);
    ctx.stroke();
    ctx.restore();
  }
};

// ─── 气泡标签插件 ─────────────────────────────────────────
const labelPlugin = {
  id: "bubbleLabels",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const ds = chart.data.datasets[0];
    ds.data.forEach((pt, i) => {
      const meta = chart.getDatasetMeta(0).data[i];
      if (!meta) return;
      const { x, y } = meta.getProps(["x","y"], true);
      const item = pt._meta;

      ctx.save();

      // 类别名（大字）
      ctx.font = "bold 14px 'PingFang SC', 'Microsoft YaHei', sans-serif";
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 3;
      ctx.fillText(item.label, x, y - 8);

      // 节省人天（小字）
      ctx.font = "12px 'PingFang SC', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.shadowBlur = 2;
      ctx.fillText(`~${item.saveDays}人天/月`, x, y + 9);

      ctx.restore();
    });
  }
};

// ─── 渲染 ─────────────────────────────────────────────────
const chart = new Chart(
  document.getElementById("bubble").getContext("2d"),
  {
    type: "bubble",
    data: { datasets: [dataset] },
    options: {
      responsive: true,
      animation: { duration: 900, easing: "easeOutQuart" },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        x: {
          min: 0.6, max: 3.8,
          title: {
            display: true,
            text: "← 低难度          实现难易度          高难度 →",
            font: { size: 12, weight: "600" }, color: "#555",
          },
          ticks: {
            stepSize: 1,
            callback: v => ({1:"低",2:"中",3:"高"}[v] || ""),
            font: { size: 12 }, color: "#888",
          },
          grid: { color: "rgba(0,0,0,0.05)" },
        },
        y: {
          min: 0.8, max: 4.1,
          title: {
            display: true,
            text: "↑ 业务影响力",
            font: { size: 12, weight: "600" }, color: "#555",
          },
          ticks: {
            stepSize: 1,
            callback: v => ({1:"低",2:"中",3:"高"}[v] || ""),
            font: { size: 12 }, color: "#888",
          },
          grid: { color: "rgba(0,0,0,0.05)" },
        },
      },
      onHover(e, els) {
        e.native.target.style.cursor = els.length ? "pointer" : "default";
      },
    },
    plugins: [quadrantPlugin, labelPlugin],
  }
);

// ─── Tooltip ─────────────────────────────────────────────
const tip = document.getElementById("tooltip");
const capLabel = { has:"✅ 已有能力", partial:"⚡ 有部分能力", none:"❌ 无现有能力" };
const pColor   = { P0:"#e74c3c", P1:"#e67e22", P2:"#3498db" };

document.getElementById("bubble").addEventListener("mousemove", e => {
  const pts = chart.getElementsAtEventForMode(e, "nearest", { intersect: true }, false);
  if (!pts.length) { tip.style.display = "none"; return; }
  const item = chart.data.datasets[0].data[pts[0].index]._meta;
  tip.innerHTML = `
    <div style="font-weight:700;font-size:15px;margin-bottom:5px">📂 ${item.label}</div>
    <div style="white-space:pre-line;font-size:12px;opacity:0.9">${item.detail}</div>
    <div style="margin-top:6px">${capLabel[item.cap]}</div>
    <div style="color:#f9ca24;font-weight:600">优先级：${item.priority}</div>
  `;
  tip.style.display = "block";
  tip.style.left = (e.clientX + 16) + "px";
  tip.style.top  = (e.clientY - 12) + "px";
});
document.getElementById("bubble").addEventListener("mouseleave", () => {
  tip.style.display = "none";
});
</script>
</body>
</html>
