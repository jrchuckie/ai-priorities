<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快消 AI 专项</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f0f2f5; height:100vh; display:flex; flex-direction:column; }

/* ── Top bar ── */
.topbar {
  background:#1a1a2e;
  padding:0 32px;
  display:flex;
  align-items:center;
  gap:0;
  height:52px;
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,0.18);
}
.topbar-title {
  color:rgba(255,255,255,0.6);
  font-size:13px;
  font-weight:600;
  letter-spacing:0.5px;
  margin-right:28px;
  white-space:nowrap;
}
.topbar-title span { color:white; }

.tab-btn {
  display:flex; align-items:center; gap:7px;
  padding:0 22px; height:52px;
  border:none; background:transparent; cursor:pointer;
  color:rgba(255,255,255,0.55); font-size:14px; font-weight:600;
  border-bottom:3px solid transparent;
  transition:all 0.18s; white-space:nowrap;
  font-family:inherit;
}
.tab-btn:hover { color:rgba(255,255,255,0.85); }
.tab-btn.active {
  color:white;
  border-bottom-color:#5dade2;
  background:rgba(255,255,255,0.06);
}
.tab-icon { font-size:16px; }

.topbar-right {
  margin-left:auto;
  display:flex; align-items:center; gap:12px;
}
.ext-link {
  color:rgba(255,255,255,0.45); font-size:12px; text-decoration:none;
  padding:4px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.15);
  transition:all 0.15s;
}
.ext-link:hover { color:white; border-color:rgba(255,255,255,0.4); }

/* ── iframe 容器 ── */
.tab-panel { flex:1; display:none; }
.tab-panel.active { display:flex; }
.tab-panel iframe {
  width:100%; height:100%; border:none; flex:1;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🤖 <span>快消 AI 专项</span></div>

  <button class="tab-btn active" data-tab="priorities">
    <span class="tab-icon">📋</span> Priorities 总览
  </button>
  <button class="tab-btn" data-tab="workflow">
    <span class="tab-icon">🗺️</span> AI 提效地图
  </button>

  <div class="topbar-right">
    <a class="ext-link" id="ext-link" href="https://jrchuckie.github.io/ai-priorities/index.html" target="_blank">↗ 新窗口打开</a>
  </div>
</div>

<div class="tab-panel active" id="panel-priorities">
  <iframe src="https://jrchuckie.github.io/ai-priorities/index.html" id="frame-priorities"></iframe>
</div>
<div class="tab-panel" id="panel-workflow">
  <iframe src="https://jrchuckie.github.io/ai-priorities/workflow.html" id="frame-workflow" loading="lazy"></iframe>
</div>

<script>
const tabs = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tab-panel');
const extLink = document.getElementById('ext-link');

const urls = {
  priorities: 'https://jrchuckie.github.io/ai-priorities/index.html',
  workflow:   'https://jrchuckie.github.io/ai-priorities/workflow.html',
};

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
    extLink.href = urls[tab];
  });
});
</script>
</body>
</html>
